name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo check
      - run: cargo check --bench tree_worker_stage1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: rustup component add rust-analyzer
      - run: make deps/tree-sitter
      - run: cargo test
      - run: cargo build --release --locked --bin kakehashi
      - name: Smoke-test tree worker benchmark CLI
        run: >-
          cargo bench --locked --bench tree_worker_stage1 --
          --bin target/release/kakehashi
          --parser deps/tree-sitter/parser/rust.so
          --requests 8 --threads 2 --lines 20

  benchmark-tools:
    name: Benchmark tools (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Test benchmark tooling
        run: python3 -m unittest discover -s benches/profile -p 'test_*.py'

  cross-platform-check:
    name: Cross-platform check (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo check --all-targets --all-features

  linux-worker-lifecycle:
    name: Linux worker lifecycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: >-
          cargo test --features e2e --test linux_tree_worker_pdeathsig
          -- --nocapture

  linux-worker-startup-measurement:
    name: Linux worker startup measurement
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASELINE_COMMIT: 09a6fd7248dd70916468a6335fd62485474bd83a
      CANDIDATE_COMMIT: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build immutable Stage 21 and Stage 22 binaries
        run: |
          git worktree add --detach "$RUNNER_TEMP/stage21-source" "$BASELINE_COMMIT"
          CARGO_TARGET_DIR="$RUNNER_TEMP/stage21-target" \
            cargo build --locked --release --bin kakehashi \
            --manifest-path "$RUNNER_TEMP/stage21-source/Cargo.toml"
          CARGO_TARGET_DIR="$RUNNER_TEMP/stage21-target" \
            cargo build --locked --release --bench tree_worker_stage1 \
            --manifest-path "$RUNNER_TEMP/stage21-source/Cargo.toml"
          CARGO_TARGET_DIR="$RUNNER_TEMP/stage22-target" \
            cargo build --locked --release --bin kakehashi
          CARGO_TARGET_DIR="$RUNNER_TEMP/stage22-target" \
            cargo build --locked --release --bench tree_worker_stage1
      - name: Install immutable Rust parser and query
        run: >-
          "$RUNNER_TEMP/stage22-target/release/kakehashi"
          language install rust --data-dir "$RUNNER_TEMP/kakehashi-data" --force
      - name: Measure order-reversed startup pairs
        run: |
          BASELINE_BENCH=$(find "$RUNNER_TEMP/stage21-target/release/deps" \
            -maxdepth 1 -type f -name 'tree_worker_stage1-*' -perm -111 | head -n 1)
          CANDIDATE_BENCH=$(find "$RUNNER_TEMP/stage22-target/release/deps" \
            -maxdepth 1 -type f -name 'tree_worker_stage1-*' -perm -111 | head -n 1)
          test -n "$BASELINE_BENCH"
          test -n "$CANDIDATE_BENCH"
          python3 benches/profile/compare_worker_startup.py \
            --baseline-bin "$RUNNER_TEMP/stage21-target/release/kakehashi" \
            --candidate-bin "$RUNNER_TEMP/stage22-target/release/kakehashi" \
            --baseline-bench "$BASELINE_BENCH" \
            --candidate-bench "$CANDIDATE_BENCH" \
            --parser "$RUNNER_TEMP/kakehashi-data/parser/rust.so" \
            --data-dir "$RUNNER_TEMP/kakehashi-data" \
            --baseline-commit "$BASELINE_COMMIT" \
            --candidate-commit "$CANDIDATE_COMMIT" \
            --pairs 12 --warmup-pairs 2 \
            --output stage22-linux-worker-startup.json
      - uses: actions/upload-artifact@v7
        with:
          name: stage22-linux-worker-startup
          path: stage22-linux-worker-startup.json

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo install cargo-audit --locked
      - run: cargo audit
