name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo check
      - run: cargo check --bench tree_worker_stage1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: rustup component add rust-analyzer
      - run: make deps/tree-sitter
      - run: cargo test
      - name: Smoke-test tree worker benchmark CLI
        run: >-
          cargo bench --locked --bench tree_worker_stage1 --
          --bin target/release/kakehashi
          --parser deps/tree-sitter/parser/rust.so
          --requests 8 --threads 2 --lines 20

  benchmark-tools:
    name: Benchmark tools (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Test benchmark tooling
        run: python3 -m unittest discover -s benches/profile -p 'test_*.py'

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: cargo install cargo-audit --locked
      - run: cargo audit
